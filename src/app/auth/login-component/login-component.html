<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow-sm" style="width: 380px;">
    
    <h4 class="mb-1 fw-semibold">Welcome back</h4>
    <p class="text-muted mb-4" style="font-size: 14px;">Sign in to LifeSync Pro</p>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input 
        type="email" 
        class="form-control" 
        placeholder="you@example.com"
        [(ngModel)]="email" />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input 
        type="password" 
        class="form-control" 
        placeholder="Enter your password"
        [(ngModel)]="password" />
    </div>

    <button class="btn btn-primary w-100" (click)="onLogin()">
      Sign In
    </button>

  </div>
</div>

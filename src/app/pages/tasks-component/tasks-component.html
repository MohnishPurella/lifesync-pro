<div class="p-4">
  <h4 class="mb-1 fw-semibold">My Tasks</h4>
  <p class="text-muted mb-4" style="font-size: 14px;">
    {{ tasks.length }} tasks today
  </p>

  <div class="d-flex flex-column gap-2">
    @for (task of tasks; track task.id) {
      <div class="card px-3 py-2 d-flex flex-row align-items-center gap-3">
        
        <input 
          type="checkbox" 
          [checked]="task.done"
          (change)="toggle(task.id)" />
        
        <span [style.text-decoration]="task.done ? 'line-through' : 'none'"
              [style.color]="task.done ? '#aaa' : 'inherit'">
          {{ task.title }}
        </span>

        <span class="ms-auto text-muted" style="font-size: 12px;">
            {{ task.due | date:'MMM d' }}
        </span>
        
      </div>
    }
  </div>
</div>
